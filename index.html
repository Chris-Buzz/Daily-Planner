<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app-container">
    <div class="sidebar">
      <h2>Days</h2>
      <div class="week-navigation">
        <button id="prev-week-btn">&larr;</button>
        <span id="week-label">This Week</span>
        <button id="next-week-btn">&rarr;</button>
      </div>
      <ul class="days-list">
        <li class="day-item active">Monday</li>
        <li class="day-item">Tuesday</li>
        <li class="day-item">Wednesday</li>
        <li class="day-item">Thursday</li>
        <li class="day-item">Friday</li>
        <li class="day-item">Saturday</li>
        <li class="day-item">Sunday</li>
      </ul>
    </div>

    <div class="main-content">
      <h2 id="current-day">Monday</h2>
      <div id="task-container">
        <input id="task-title-input" type="text" placeholder="Enter task title                              Optional">
        <input type="text" id="task-input" placeholder="Enter your task">
        <input type="time" id="clock-btn" class="time-input">
      </div>
      <div id="center-container">
        <button id="add-task-btn">Add Task</button>
        <h3>Tasks</h3>
        <ul class="task-list"></ul>
        <h3>Completed Tasks</h3>
        <ul class="completed-task-list"></ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
